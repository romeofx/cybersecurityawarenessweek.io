<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cybersecurity Awareness Week 2026</title>

<link rel="icon" href="assets/favicon.ico">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="nav">

<img src="assets/logo.png" class="logo">

<h1>Cybersecurity Awareness Week 2026</h1>

</div>

</header>

<section class="hero">

<h2>Protect Your Digital Life</h2>

<p>Register for Cybersecurity Awareness Week organized by Exelsor Projects Limited. Limited seats available.</p>

<a href="#form-section" class="btn">Register Now</a>

</section>


<section id="form-section" class="form-container">

<h2>Event Registration</h2>

<form id="registrationForm" method="POST" action="YOUR_GOOGLE_SCRIPT_URL">

<input type="text" name="fullname" placeholder="Full Name" required>

<input type="email" name="email" placeholder="Email Address" required>

<input type="tel" name="phone" placeholder="Phone Number" required>

<select name="gender" required>

<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
<option>Prefer not to say</option>

</select>

<select name="age">

<option value="">Age Range</option>
<option>Under 15</option>
<option>15–20</option>
<option>21–30</option>
<option>31–40</option>
<option>41 and above</option>

</select>

<select name="role">

<option value="">Are you a:</option>
<option>Student</option>
<option>Business Owner</option>
<option>Teacher</option>
<option>Employee</option>
<option>Entrepreneur</option>
<option>Other</option>

</select>

<input type="text" name="organization" placeholder="Name of School or Organization" required>

<label>Have you attended cybersecurity training before?</label>

<select name="training">

<option>Yes</option>
<option>No</option>

</select>

<label>What concerns you most about online security?</label>

<select name="concern">

<option>Hacked social media accounts</option>
<option>Online scams</option>
<option>Phishing emails</option>
<option>Fraudulent links</option>
<option>Data theft</option>
<option>Business security</option>
<option>Other</option>

</select>

<label>Do you know how to check shortened links before clicking?</label>

<select name="linkSafety">

<option>Yes</option>
<option>No</option>
<option>Not sure</option>

</select>

<label>Have you ever fallen victim to an online scam?</label>

<select name="scamVictim">

<option>Yes</option>
<option>No</option>

</select>

<label>How did you hear about this event?</label>

<select name="source">

<option>Facebook</option>
<option>WhatsApp</option>
<option>Friend</option>
<option>Other</option>

</select>

<label>I agree to receive event updates and cybersecurity tips</label>

<select name="consent" required>

<option>Yes</option>
<option>No</option>

</select>

<button type="submit">Submit Registration</button>

</form>

<p id="responseMessage"></p>

</section>


<footer>

<p>© 2026 Exelsor Projects Limited. Cybersecurity Awareness Initiative.</p>

</footer>

<script src="script.js"></script>

</body>
</html>

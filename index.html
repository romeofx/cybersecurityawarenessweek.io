<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cybersecurity Awareness Week 2026</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<!-- Favicon -->
<link rel="icon" href="assets/favicon.ico">

<!-- CSS -->
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Roboto', sans-serif;
}

body {
  background: #f4f6f8;
  color: #333;
}

/* Hero Section */
section.hero {
  position: relative;
  background: url('assets/cybersecurity-bg.jpg') no-repeat center center/cover;
  height: 90vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.55);
  z-index: 1;
}

.hero-content {
  position: relative;
  z-index: 10; /* in front of overlay */
  color: #fff;
  animation: fadeInUp 1s ease-out forwards;
}

.hero-content h1 {
  font-size: 2.8em;
  margin-bottom: 15px;
}

.hero-content p {
  font-size: 1.3em;
  margin-bottom: 20px;
}

/* Animation */
@keyframes fadeInUp {
  0% { opacity: 0; transform: translateY(20px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* Form Section */
section.form-container {
  max-width: 650px;
  margin: 50px auto;
  padding: 25px;
  border-radius: 15px;
  background: #fff;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

section.form-container h2 {
  text-align: center;
  margin-bottom: 25px;
  color: #0073e6;
}

form#registrationForm input,
form#registrationForm select,
form#registrationForm button {
  width: 100%;
  margin-bottom: 15px;
  padding: 12px 15px;
  font-size: 1em;
  border-radius: 8px;
  border: 1px solid #ccc;
  transition: 0.3s;
}

form#registrationForm input:focus,
form#registrationForm select:focus {
  border-color: #0073e6;
  outline: none;
  box-shadow: 0 0 5px rgba(0,115,230,0.5);
}

form#registrationForm button {
  background-color: #0073e6;
  color: #fff;
  border: none;
  cursor: pointer;
  font-weight: bold;
  border-radius: 8px;
  padding: 12px;
  transition: 0.3s;
}

form#registrationForm button:hover {
  background-color: #005bb5;
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* Footer */
footer {
  text-align: center;
  padding: 25px;
  background-color: #1a1a1a;
  color: #fff;
  font-size: 0.9em;
  opacity: 0.9;
}

/* About Page Link */
.about-link {
  color: #ff9900;
  text-decoration: underline;
  cursor: pointer;
}

/* Responsive */
@media (max-width: 768px) {
  .hero-content h1 { font-size: 2em; }
  .hero-content p { font-size: 1.1em; }
}
</style>
</head>

<body>

<section class="hero">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <!-- Keep header exactly as it is -->
    <header class="header">
      <img src="assets/logo.png" class="logo" alt="Cybersecurity Awareness Week Logo">
      <h1>Cybersecurity Awareness Week 2026</h1>
      <p>Organized by Exelsor Projects Limited</p>
    </header>
    <p>Join Cybersecurity Awareness Week 2026. Limited seats available.</p>
  </div>
</section>

<section id="form-section" class="form-container">
  <h2>Event Registration</h2>
  <form id="registrationForm">
    <input type="text" name="fullname" placeholder="Full Name" required>
    <input type="email" name="email" placeholder="Email Address" required>
    <input type="tel" name="phone" placeholder="Phone Number" required>
    <select name="gender" required>
      <option value="">Gender</option>
      <option>Male</option>
      <option>Female</option>
      <option>Prefer not to say</option>
    </select>
    <select name="age">
      <option value="">Age Range</option>
      <option>Under 15</option>
      <option>15–20</option>
      <option>21–30</option>
      <option>31–40</option>
      <option>41 and above</option>
    </select>
    <select name="role">
      <option value="">Are you a</option>
      <option>Student</option>
      <option>Business Owner</option>
      <option>Teacher</option>
      <option>Employee</option>
      <option>Entrepreneur</option>
      <option>Other</option>
    </select>
    <input type="text" name="organization" placeholder="School or Organization" required>
    <select name="training">
      <option value="">Cybersecurity training before</option>
      <option>Yes</option>
      <option>No</option>
    </select>
    <select name="concern">
      <option value="">Main online security concern</option>
      <option>Hacked social media accounts</option>
      <option>Online scams</option>
      <option>Phishing emails</option>
      <option>Fraudulent links</option>
      <option>Data theft</option>
      <option>Business security</option>
      <option>Other</option>
    </select>
    <select name="linkSafety">
      <option value="">Check shortened link safety</option>
      <option>Yes</option>
      <option>No</option>
      <option>Not sure</option>
    </select>
    <select name="scamVictim">
      <option value="">Victim of online scam</option>
      <option>Yes</option>
      <option>No</option>
    </select>
    <select name="source">
      <option value="">How did you hear</option>
      <option>Facebook</option>
      <option>WhatsApp</option>
      <option>Friend</option>
      <option>Other</option>
    </select>
    <select name="consent" required>
      <option value="">Receive event updates</option>
      <option>Yes</option>
      <option>No</option>
    </select>
    <button type="submit">Submit Registration</button>
  </form>
  <p id="responseMessage"></p>
  <p>Learn more about <span class="about-link" onclick="window.location.href='about.html'">Exelsor Projects Ltd.</span></p>
</section>

<footer>
  <p>© 2026 Exelsor Projects Limited</p>
</footer>

<script>
document.getElementById('registrationForm').addEventListener('submit', function(e) {
  e.preventDefault();
  document.getElementById('responseMessage').textContent = "Thank you! Your registration has been submitted.";
  this.reset();
});
</script>

</body>
</html>
